{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Member</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 5px;
        }
        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .form-container h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover {
            opacity: 0.9;
        }
        .messages { margin-bottom: 20px; }
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            background: #d4edda;
            color: #155724;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>👤 Add New Member</h1>
        <a href="{% url 'expenses:home' %}">← Back to Dashboard</a>
    </div>

    <div class="form-container">
        <h2>👤 Member Details</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>👤 User</label>
                    <select name="user" required>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>👑 Family Head</label>
                    <select name="family_head" required>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>📝 Full Name</label>
                    <input type="text" name="name" placeholder="নাম লিখুন" required>
                </div>
                <div class="form-group">
                    <label>🎭 Role</label>
                    <select name="role">
                        {% for value, label in roles %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>👨 Father's Name</label>
                    <input type="text" name="father_name" placeholder="বাবার নাম">
                </div>
                <div class="form-group">
                    <label>👩 Mother's Name</label>
                    <input type="text" name="mother_name" placeholder="মায়ের নাম">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>📞 Phone Number</label>
                    <input type="text" name="phone_number" placeholder="ফোন নম্বর">
                </div>
                <div class="form-group">
                    <label>💰 Salary</label>
                    <input type="number" name="salary" placeholder="মাসিক আয়" step="0.01">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>💼 Income Source</label>
                    <select name="income_source">
                        <option value="">--------</option>
                        {% for source in income_sources %}
                        <option value="{{ source.id }}">{{ source.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>🏠 Address</label>
                <textarea name="address" rows="3" placeholder="সম্পূর্ণ ঠিকানা লিখুন"></textarea>
            </div>

            <button type="submit" class="btn-submit">✅ Save Member</button>
        </form>
    </div>
</body>
</html>
